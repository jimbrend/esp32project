; PlatformIO project config for the Waveshare ESP32-S3-LCD-1.47B
; https://docs.platformio.org/page/projectconf.html

[env:waveshare-esp32s3-lcd-1_47b]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; This board carries an ESP32-S3R8: 16MB flash, 8MB *octal* PSRAM.
; The generic esp32-s3-devkitc-1 board definition defaults to no PSRAM,
; so we override the memory settings explicitly.
board_build.mcu           = esp32s3
board_build.f_cpu         = 240000000L
board_build.psram_type    = opi
board_build.flash_mode    = qio
board_build.f_flash       = 80000000L
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216

build_flags =
    -DBOARD_HAS_PSRAM
    -DLGFX_USE_V1

; The board's USB-C port goes through a CH343P USB-to-UART chip, not the
; ESP32-S3's native USB peripheral, so plain Serial over UART0 just works -
; no USB CDC flags needed.
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    adafruit/Adafruit NeoPixel @ ^1.12.3
    bblanchon/ArduinoJson @ ^7.0.0
